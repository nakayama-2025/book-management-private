<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stocker - 在庫管理システム</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        rel="stylesheet">
    <!-- Ionicons for Icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338ca;
            --bg-body: #F3F4F6;
            --bg-surface: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border: #E5E7EB;

            --status-ok: #10B981;
            --status-warn: #F59E0B;
            --status-crit: #EF4444;

            /* Area Colors */
            --area-a: #3B82F6;
            /* Blue */
            --area-b: #10B981;
            /* Green */
            --area-c: #EAB308;
            /* Yellow */
            --area-d: #F97316;
            /* Vermilion/Orange */
            --area-e: #C084FC;
            /* Light Purple */
            --area-f: #06B6D4;
            /* Cyan */
            --area-g: #EC4899;
            /* Pink */

            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            margin: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        #app {
            display: flex;
            height: 100%;
        }

        /* Sidebar (Desktop) */
        .sidebar {
            width: 260px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            display: none;
            /* Mobile first hidden */
        }

        @media(min-width: 768px) {
            .sidebar {
                display: flex;
            }

            .bottom-nav {
                display: none !important;
            }
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .sidebar nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .nav-item:hover {
            background: #F9FAFB;
            color: var(--primary);
        }

        .nav-item.active {
            background: #EEF2FF;
            color: var(--primary);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .info {
            display: flex;
            flex-direction: column;
        }

        .info .name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .info .role {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            position: relative;
            padding-bottom: 80px;
            /* Space for bottom nav */
        }

        .view {
            display: none;
            padding: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeIn 0.3s ease;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        /* Dashboard */
        .search-panel {
            background: var(--bg-surface);
            padding: 1rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            background: #F9FAFB;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            margin-left: 0.5rem;
            width: 100%;
            font-size: 1rem;
        }

        .filters select {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            outline: none;
            background: white;
        }

        .table-container {
            background: var(--bg-surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            white-space: nowrap;
        }

        th {
            text-align: left;
            padding: 1rem;
            color: var(--text-muted);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-ok {
            background: #DCFCE7;
            color: #166534;
        }

        .status-empty {
            background: #F3F4F6;
            color: #374151;
        }

        .age-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .age-new {
            background: var(--status-ok);
        }

        .age-mid {
            background: var(--status-warn);
        }

        .age-old {
            background: var(--status-crit);
        }

        /* Forms */
        .form-card {
            background: var(--bg-surface);
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            max-width: 600px;
            margin: 0 auto;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .full-width {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .loc-inputs {
            display: flex;
            gap: 0.5rem;
        }

        .form-actions {
            margin-top: 2rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-text {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-weight: 500;
            cursor: pointer;
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }

        /* Map */
        .map-controls {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            /* Allow wrapping on small screens */
        }

        .chip {
            background: white;
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        /* Dynamic Area Coloring */
        .chip[data-area="A"].active {
            background: var(--area-a);
            border-color: var(--area-a);
            color: white;
        }

        .chip[data-area="B"].active {
            background: var(--area-b);
            border-color: var(--area-b);
            color: white;
        }

        .chip[data-area="C"].active {
            background: var(--area-c);
            border-color: var(--area-c);
            color: black;
        }

        /* Yellow specific */
        .chip[data-area="D"].active {
            background: var(--area-d);
            border-color: var(--area-d);
            color: white;
        }

        .chip[data-area="E"].active {
            background: var(--area-e);
            border-color: var(--area-e);
            color: white;
        }

        .chip[data-area="F"].active {
            background: var(--area-f);
            border-color: var(--area-f);
            color: white;
        }

        .chip[data-area="G"].active {
            background: var(--area-g);
            border-color: var(--area-g);
            color: white;
        }

        .shelf-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            justify-content: center;
            gap: 1rem;
            padding: 1rem 0;
        }

        .required {
            color: red;
            font-weight: bold;
        }

        .shelf-cell {
            background: white;
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
            border: 2px solid transparent;
            /* Default border */
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        /* Grid borders based on area */
        .shelf-grid[data-active-area="A"] .shelf-cell {
            border-color: var(--area-a);
        }

        .shelf-grid[data-active-area="B"] .shelf-cell {
            border-color: var(--area-b);
        }

        .shelf-grid[data-active-area="C"] .shelf-cell {
            border-color: var(--area-c);
        }

        .shelf-grid[data-active-area="D"] .shelf-cell {
            border-color: var(--area-d);
        }

        .shelf-grid[data-active-area="E"] .shelf-cell {
            border-color: var(--area-e);
        }

        .shelf-grid[data-active-area="F"] .shelf-cell {
            border-color: var(--area-f);
        }

        .shelf-grid[data-active-area="G"] .shelf-cell {
            border-color: var(--area-g);
        }

        .shelf-cell:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .shelf-cell.occupied {
            /* Occupied style overrides border specific? Or just background. 
       Let's keep the area border color but fill background lightly */
            background: #F3F4F6;
        }

        .shelf-grid[data-active-area="A"] .shelf-cell.occupied {
            background: #EFF6FF;
        }

        .shelf-grid[data-active-area="B"] .shelf-cell.occupied {
            background: #ECFDF5;
        }

        .shelf-grid[data-active-area="C"] .shelf-cell.occupied {
            background: #FFFBEB;
        }

        .shelf-grid[data-active-area="D"] .shelf-cell.occupied {
            background: #FFF7ED;
        }

        .shelf-grid[data-active-area="E"] .shelf-cell.occupied {
            background: #FAF5FF;
        }

        .shelf-grid[data-active-area="F"] .shelf-cell.occupied {
            background: #ECFEFF;
        }

        .shelf-grid[data-active-area="G"] .shelf-cell.occupied {
            background: #FDF2F8;
        }

        .shelf-cell.grayed-out {
            background-color: #E5E7EB;
            border-color: #D1D5DB !important;
            color: #9CA3AF;
            /* pointer-events: none; removed to allow selection for enabling */
            opacity: 0.6;
        }

        .shelf-cell.full {
            border-color: var(--status-warn);
        }

        .shelf-cell .code {
            font-weight: 700;
            display: block;
            margin-bottom: 0.5rem;
        }

        .shelf-cell .count {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Mobile Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 0.75rem;
            z-index: 100;
        }

        .bottom-nav .nav-item {
            flex-direction: column;
            gap: 0.25rem;
            font-size: 0.7rem;
            padding: 0;
        }

        .bottom-nav ion-icon {
            font-size: 1.5rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal.open {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: var(--radius);
            width: 90%;
            max-width: 400px;
        }

        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin: 1rem 0;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .loading-spinner {
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            display: none;
        }

        .loading-spinner.active {
            display: block;
        }

        /* Image Preview & Upload */
        .image-upload-area {
            margin-bottom: 1rem;
        }

        .image-preview {
            width: 100%;
            height: 150px;
            background: #f9fafb;
            border: 2px dashed var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .image-preview span {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .hidden-file-input {
            display: none;
        }

        /* Paper Selection */
        .paper-selector {
            background: #F3F4F6;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
        }

        .paper-selector h4 {
            margin: 0 0 0.5rem 0;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        /* Map Overview Section */
        .map-overview-section {
            background: var(--bg-surface);
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            margin-bottom: 1.5rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .section-header h2 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .text-muted {
            color: var(--text-muted);
        }

        .text-sm {
            font-size: 0.85rem;
        }

        .map-image-container {
            width: 100%;
            cursor: zoom-in;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.2s;
            background: white;
            display: flex;
            justify-content: center;
        }

        .map-image-container:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }

        .shelf-map-img {
            width: 100%;
            height: auto;
            display: block;
            max-height: 400px;
            object-fit: contain;
        }

        /* Image Modal */
        .image-modal {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .image-modal.open {
            display: flex;
        }

        .modal-content-image {
            position: relative;
            max-width: 95vw;
            max-height: 95vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-map-img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            background: transparent;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            z-index: 1010;
        }

        .shelf-cell.selected {
            border-color: var(--primary) !important;
            background-color: #E0E7FF !important;
            box-shadow: 0 0 0 4px var(--primary-hover);
            z-index: 10;
        }

        .camera-icon {
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
            margin-left: 0.5rem;
            padding: 0.25rem;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .camera-icon:hover {
            background: #E5E7EB;
            color: var(--text-main);
        }

        .map-overlays {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .map-hitbox {
            position: absolute;
            cursor: pointer;
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.0);
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .map-hitbox:hover {
            background: rgba(79, 70, 229, 0.1);
            border-color: var(--primary);
        }

        .toggle-switch {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .toggle-switch input {
            margin-right: 0.5rem;
            cursor: pointer;
        }

        .toggle-label {
            font-size: 0.85rem;
            color: var(--text-main);
        }

        .btn-danger {
            background: white;
            border: 1px solid #EF4444;
            color: #EF4444;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-danger:hover {
            background: #FEE2E2;
        }
    </style>
    <script>
        /**
         * Configuration & State
         */
        const CONFIG = {
            USE_REAL_API: true, // trueにするとGASと直接通信します
            // ↓ ここにご自身の GAS デプロイURL を貼り付けてください
            GAS_WEB_APP_URL: "YOUR_GAS_DEPLOYMENT_URL",
        };

        let appState = {
            inventory: [],
            logs: [],
            currentView: 'dashboard',
            filter: { text: '', area: '', status: '有効' },
            mergedShelves: false,
            selectedShelves: [], // for map selection
            disabledShelves: [] // loaded from DB
        };

        const SHELF_CONFIG = {
            'A': { rows: ['天', '上', '中', '下', '底'], cols: 10 },
            'B': { rows: ['天', '上', '中', '下', '底'], cols: 10 },
            'C': { rows: ['天', '上', '中', '下', '底'], cols: 10 },
            'D': { rows: ['天', '上', '中', '下', '底'], cols: 5 },
            'E': { rows: ['天', '上', '中', '下', '底'], cols: 4 },
            'F': { rows: ['天', '上', '中', '下', '底'], cols: 10 },
            'G': { rows: ['天', '底'], cols: 4 }
        };

        /**
         * Initialization
         */
        document.addEventListener('DOMContentLoaded', () => {
            // Check URL Params for QR Code Entry
            const urlParams = new URLSearchParams(window.location.search);
            const locParam = urlParams.get('loc');

            if (locParam) {
                // Mode: Register via QR
                router('register');
                parseLocCode(locParam);
            } else {
                router('dashboard');
                refreshData();
                handleTypeChange();
            }
        });

        /**
         * Routing
         */
        function router(viewName) {
            // Hide all views
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

            // Show target
            document.getElementById(`view-${viewName}`).classList.add('active');

            // Update Nav
            // Note: Simple logic, might need adjustment for mobile/desktop separation
            const navs = document.querySelectorAll(`.nav-item[onclick="router('${viewName}')"]`);
            navs.forEach(n => n.classList.add('active'));

            appState.currentView = viewName;

            if (viewName === 'map') {
                renderMap();
            } else if (viewName === 'logs') {
                renderLogs();
            }
        }

        function jumpToArea(area) {
            router('dashboard');
            document.getElementById('filterArea').value = area;
            filterItems();

            const viewModal = document.getElementById('mapViewModal');
            if (viewModal) {
                viewModal.classList.remove('open');
            }
        }

        /**
         * Data Handling
         */
        async function refreshData() {
            toggleLoading(true);
            try {
                const response = await API.getData();
                if (response.status === 'success') {
                    // Support both formats for backward compat if needed, but here we change mock
                    if (response.data.inventory) {
                        appState.inventory = response.data.inventory;
                        appState.disabledShelves = response.data.disabled || [];
                    } else {
                        appState.inventory = response.data; // fallback
                    }
                    renderTable();
                } else {

        async function quickStockOp(id, multiplier) {
            const input = document.getElementById(`qty-diff-${id}`);
            const val = parseInt(input.value);
            if (!val || val <= 0) {
                alert("数量を入力してください");
                return;
            }

            // Logic: If multiplier is -1 (shipping), we subtract. If 1 (adding/return), we add.
            const qtyDiff = val * multiplier;

            // We reuse 'ship' endpoint logic for subtraction or add a new one. 
            // Let's use a generic 'updateStock' logic.
            const res = await API.post('ship', {
                qty_diff: -qtyDiff, // ship API subtracts 'qty_diff'. So if we want to add, we pass negative diff? No, let's look at logic.
                // Current 'ship' logic: item.qty -= payload.qty_diff
                // So for "Out" (multiplier -1), we pass +val. 
                // For "In" (multiplier 1), we pass -val.
                // wait, quickStockOp passes multiplier. 
                // If multiplier is -1 (Out), we want qty to decrease. 
                // qty_diff in backend is subtracted: `item.qty -= payload.qty_diff`
                // So for "Out", we send positive value `val`.
                // For "In", we send negative value `-val`.

                qty_diff: (multiplier === -1) ? val : -val,
                memo: (multiplier === -1) ? 'クイック出庫' : 'クイック入庫',
                user: 'User'
            });

            if (res.status === 'success') {
                refreshData();
            }
        }

        async function toggleShelfStatus(disable) {
            if (appState.selectedShelves.length === 0) return;

            // disable の時だけ「在庫がある棚は不可」チェック
            if (disable) {
                const errorLocs = appState.selectedShelves.filter(loc =>
                    appState.inventory.some(i => i.loc_code === loc && i.status === "有効")
                );
                if (errorLocs.length > 0) {
                    alert(`以下の棚には在庫があるため、使用不可(グレーアウト)にできません:
${errorLocs.join(", ")}`);
                    return;
                }
            }

            // 次の disabled 配列を作る（ローカルの状態更新）
            let newDisabled;
            if (disable) {
                newDisabled = [...new Set([...appState.disabledShelves, ...appState.selectedShelves])];
            } else {
                newDisabled = appState.disabledShelves.filter(s => !appState.selectedShelves.includes(s));
            }

            try {
                // ★サーバーへ一括保存（全置換）
                await saveDisabledShelvesToServer(newDisabled);

                // UI反映
                appState.disabledShelves = newDisabled;
                appState.selectedShelves = [];

                renderMap();          // まず見た目を即反映
                // await refreshData(); // 必要なら同期用に（inventoryも更新したい時）

        window.handleFallbackScan = function (event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5Qrcode("reader");
            }

            const readerDiv = document.getElementById('reader');
            readerDiv.innerHTML = '<div style="padding: 3rem 1rem; background: #fff; text-align: center; color: var(--primary); font-weight: bold;">画像からバーコードを解析中...<br><br><div class="loading-spinner active" style="display:inline-block;"></div></div>';

            html5QrcodeScanner.scanFile(file, true)
                .then(decodedText => {
                    onScanSuccess(decodedText);
                })
                .catch(err => {
                    alert("バーコードが読み取れませんでした。ピントを合わせて再度撮影してください。");
                    document.getElementById('scannerModal').classList.remove('open');
                });
        };

        function stopScanner() {
            document.getElementById('scannerModal').classList.remove('open');
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then((ignore) => {
                    // QR Code scanning is stopped.
                    html5QrcodeScanner.clear();
                    html5QrcodeScanner = null;
                }).catch((err) => {
                    // Stop failed, handle it.
                });
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            // 2段バーコード（ISBN=978/979〜、Cコード=192〜等）のうち、ISBN以外は無視してスキャン続行
            // ただし在庫ID(ID-)の直接読み取りは許可
            if (!decodedText.startsWith("978") && !decodedText.startsWith("979") && !decodedText.startsWith("ID-")) {
                return;
            }

            // Hit!
            stopScanner();
            const cleanScanText = cleanIsbn(decodedText);

            // 検索窓に流し込んで自動検索
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.value = cleanScanText;
                filterItems();
            }

            // Check DB
            const hits = appState.inventory.filter(i => {
                if (i.status !== '有効') return false;
                if (i.id === decodedText) return true;
                if (i.isbn && cleanIsbn(i.isbn) === cleanScanText) return true;
                return false;
            });

            if (hits.length > 0) {
                showScanResultCard(hits[0]);
            } else {
                alert(`未登録または在庫のないISBNです: ${decodedText}`);
            }
        }

        function getAgeColor(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diffDays = (now - date) / (1000 * 60 * 60 * 24);

            if (diffDays < 180) return 'age-new'; // 0.5y
            if (diffDays < 365) return 'age-mid'; // 1y
            if (diffDays < 730) return 'age-mid'; // 2y (using same yellow for mid range)
            return 'age-old'; // > 2y
        }

            const csv = Papa.unparse({
                fields: fields,
                data: items
            });

            // Add BOM for Excel
            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            const blob = new Blob([bom, csv], { type: "text/csv;charset=utf-8;" });

            // Download
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, "");
            link.setAttribute("href", url);
            link.setAttribute("download", `stocker_export_${dateStr}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function importCSV(event) {
            const file = event.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: async function (results) {
                    if (results.errors.length > 0) {
                        console.warn("CSV Parse Errors:", results.errors);
                        alert("CSV読み込み中にエラーが発生しました。コンソールを確認してください。");
                    }

                    const rows = results.data;
                    let successCount = 0;

                    if (confirm(`${rows.length}件のデータを読み込みますか？
既存のIDがある場合は上書き、なければ新規登録されます。`)) {
                        toggleLoading(true);
                        // Batch process could be better, but loop is simple for now
                        const upsertList = rows.map(row => {
                            // Cleanup fields if necessary
                            return {
                                id: row.id, // if empty, backend should generate? No, for import usually we keep ID if provided.
                                status: row.status || '有効',
                                area: row.area,
                                shelf: row.shelf,
                                column: row.column,
                                name: row.name,
                                qty: parseInt(row.qty) || 0,
                                date_in: row.date_in,
                                type: row.type,
                                size: row.size,
                                slip_no: row.slip_no,
                                client: row.client,
                                isbn: row.isbn,
                                memo: row.memo,
                                // loc_code will be reconstructed by backend or here
                                loc_code: row.loc_code || `${row.area}-${row.shelf}-${row.column}`
                            };
                        });

                        await API.post('bulk_upsert', { items: upsertList });

                        toggleLoading(false);
                        alert("読み込みが完了しました");
                        event.target.value = ''; // reset
                        refreshData();
                    }
                }
            });
        }

        function cleanIsbn(isbn) {
            if (!isbn) return "";
            return isbn.replace(/[^0-9X]/gi, "");
        }

        async function bulkImportImages(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            toggleLoading(true);
            let updates = [];

            for (let f of files) {
                const fname = f.name;
                const namePart = fname.substring(0, fname.lastIndexOf('.')) || fname;
                const cleanName = cleanIsbn(namePart);

                try {
                    const base64 = await readFileAsBase64(f);
                    // サーバー側 (Code.gs) でISBNマッチングを行うため isbn を送信
                    updates.push({ isbn: cleanName, image_data: base64 });
                } catch (err) {
                    console.error("Image Read Error", fname, err);
                }
            }

            if (updates.length > 0) {
                const res = await API.post('bulk_image_update', { updates: updates });
                if (res && res.status === 'success') {
                    alert(`GAS(サーバー)側で照合を行い、${res.count}件のデータに画像を適用しました。`);
                } else {
                    alert("画像の一括更新に失敗しました。");
                }
                refreshData();
            } else {
                alert("有効な画像ファイルが見つかりませんでした。ファイル名は「ISBN(ハイフンなし).jpg」などにしてください。");
            }

            event.target.value = '';
            toggleLoading(false);
        }

        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = e => reject(e);
                reader.readAsDataURL(file);
            });
        }

        function updatePaperSpecs() {
            const name = document.getElementById('paperNameSelect').value;
            const specSelect = document.getElementById('paperSpecSelect');
            specSelect.innerHTML = '<option value="">-</option>';

            if (!name) return;

            const relevant = PAPER_MASTER_RAW.filter(r => r[0] === name);
            relevant.forEach((r, idx) => {
                const op = document.createElement('option');
                // Value works as index in the relevant array
                op.value = idx;
                const sizeShort = r[1].split(/[（(]/)[0]; // simple display
                op.textContent = `${r[1]} / ${r[2]}`;
                specSelect.appendChild(op);
            });
        }

        function fillPaperData() {
            const name = document.getElementById('paperNameSelect').value;
            const specIdx = document.getElementById('paperSpecSelect').value;
            if (!name || specIdx === "") return;

            const row = PAPER_MASTER_RAW.filter(r => r[0] === name)[parseInt(specIdx)];

            document.getElementById('regName').value = `${row[0]} ${row[2]}`;
            document.getElementById('regSize').value = row[1];

            // Auto-fill memo with packaging info if available
            const pack = row[3];
            if (pack && pack !== '-') {
                const currentMemo = document.getElementById('regMemo').value;
                if (!currentMemo.includes(pack)) {
                    document.getElementById('regMemo').value = (currentMemo ? currentMemo + '
' : '') + `梱包: ${pack}`;
                }
            }
        }

            static async getData() {
                if (CONFIG.USE_REAL_API && CONFIG.GAS_WEB_APP_URL !== "YOUR_GAS_DEPLOYMENT_URL") {
                    try {
                        // GASから在庫一覧を取得
                        const res = await fetch(`${CONFIG.GAS_WEB_APP_URL}?action=getData`, {
                            method: 'GET',
                            redirect: 'follow' // GASのクロスドメインリダイレクトに必須
                        });
                        const json = await res.json();

                        // Python側の棚無効化設定は維持（必要な場合）
                        let disabled = [];
                        try {
                            const shelfRes = await fetch("/api/shelf_state");
                            const list = await shelfRes.json();
                            disabled = list.filter(x => x.status === "disabled").map(x => x.shelf_id);
                        } catch (e) { }

                        if (json.status === 'success') {
                            json.data.disabled = disabled;
                        }
                        return json;
                    } catch (err) {
                        console.error("GAS API Error:", err);
                        alert("GAS APIへの接続に失敗しました。URLを確認してください。");
                        return { status: 'error' };
                    }
                }

                await new Promise(r => setTimeout(r, 200)); // 少し短縮（任意）

                // inventory は当面 localStorage のまま（後でAPI化）
                let db = JSON.parse(localStorage.getItem('mock_db'));
                if (!db) {
                    db = this.getInitialData();
                    localStorage.setItem('mock_db', JSON.stringify(db));
                }

                // ★ disabled はサーバーから取得
                let disabled = [];
                try {
                    const res = await fetch("/api/shelf_state");
                    const list = await res.json();
                    disabled = list.filter(x => x.status === "disabled").map(x => x.shelf_id);
                } catch (e) {
                    console.warn("disabledShelves API failed, fallback to local:", e);
                    disabled = db.disabledShelves || [];
                }

                return { status: 'success', data: { inventory: db.inventory, disabled } };
            }

            static async getLogs() {
                let db = JSON.parse(localStorage.getItem('mock_db')) || this.getInitialData();
                return db.logs;
            }

            static async post(action, payload) {
                if (CONFIG.USE_REAL_API && CONFIG.GAS_API_URL !== "YOUR_GAS_DEPLOYMENT_URL") {
                    try {
                        // POST時はGASが text/plain として受け取るようなCORS工夫が必要な場合があります
                        const res = await fetch(CONFIG.GAS_API_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: action, payload: payload })
                        });
                        return await res.json();
                    } catch (err) {
                        console.error("GAS Post Error:", err);
                        alert("データの送信に失敗しました。GASのURL等を確認してください。");
                        return { status: 'error' };
                    }
                }

                await new Promise(r => setTimeout(r, 600));
                let db = JSON.parse(localStorage.getItem('mock_db')) || this.getInitialData();
                const now = new Date().toLocaleString('ja-JP');

                if (action === 'register') {
                    payload.id = Date.now().toString();
                    payload.status = '有効';
                    payload.loc_code = `${payload.area}-${payload.shelf}-${payload.column}`;
                    if (payload.image_data) {
                        payload.image_url = payload.image_data;
                        delete payload.image_data;
                    }
                    db.inventory.push(payload);
                    db.logs.push({ date: now, action: '入庫', target_name: payload.name, details: `新規: ${payload.qty}`, user: 'User' });

                } else if (action === 'ship') {
                    const idx = db.inventory.findIndex(i => i.id === payload.id);
                    if (idx > -1) {
                        const item = db.inventory[idx];
                        // Ensure qty is treated as number
                        item.qty = parseInt(item.qty);
                        item.qty -= payload.qty_diff;
                        if (item.qty <= 0) item.status = '空き';
                        db.logs.push({ date: now, action: '出庫', target_name: item.name, details: `出庫: -${payload.qty_diff} (残 ${item.qty}) / ${payload.memo}`, user: payload.user || 'User' });
                    }
                } else if (action === 'edit') {
                    const idx = db.inventory.findIndex(i => i.id === payload.id);
                    if (idx > -1) {
                        const item = db.inventory[idx];
                        item.status = payload.status;
                        item.name = payload.name;
                        item.qty = parseInt(payload.qty); // Ensure new qty is int

                        // Update location if provided
                        if (payload.loc_code) {
                            item.area = payload.area;
                            item.shelf = payload.shelf;
                            item.column = payload.column;
                            item.loc_code = payload.loc_code;
                        }

                        db.logs.push({ date: now, action: '編集', target_name: item.name, details: `編集: ${payload.status}, Loc:${item.loc_code}, Qty:${payload.qty}`, user: 'User' });
                    }
                } else if (action === 'delete') {
                    const idx = db.inventory.findIndex(i => i.id === payload.id);
                    if (idx > -1) {
                        const name = db.inventory[idx].name;
                        db.inventory.splice(idx, 1);
                        db.logs.push({ date: now, action: '削除', target_name: name, details: '削除されました', user: 'User' });
                    }
                } else if (action === 'update_disabled') {
                    db.disabledShelves = payload.disabled;
                } else if (action === 'bulk_upsert') {
                    const items = payload.items;
                    let count = 0;
                    items.forEach(newItem => {
                        // If ID is provided, try to find
                        let idx = -1;
                        if (newItem.id) {
                            idx = db.inventory.findIndex(i => i.id === newItem.id);
                        }

                        if (idx > -1) {
                            // Update existing
                            newItem.qty = parseInt(newItem.qty); // ensure int
                            db.inventory[idx] = { ...db.inventory[idx], ...newItem };
                        } else {
                            // Insert new
                            if (!newItem.id) newItem.id = Date.now().toString() + Math.floor(Math.random() * 1000);
                            newItem.qty = parseInt(newItem.qty);
                            // Ensure loc_code
                            if (!newItem.loc_code) newItem.loc_code = `${newItem.area}-${newItem.shelf}-${newItem.column}`;
                            // Status default
                            if (!newItem.status) newItem.status = '有効';

                            db.inventory.push(newItem);
                        }
                        count++;
                    });
                    db.logs.push({ date: now, action: '一括取込', target_name: `${count}件`, details: 'CSVインポート', user: 'User' });

                } else if (action === 'bulk_image_update') {
                    const updates = payload.updates;
                    updates.forEach(upd => {
                        const item = db.inventory.find(i => i.id === upd.id);
                        if (item) {
                            item.image_url = upd.image_data;
                        }
                    });
                    db.logs.push({ date: now, action: '画像一括', target_name: `${updates.length}件`, details: '画像マッチング更新', user: 'User' });
                }

                localStorage.setItem('mock_db', JSON.stringify(db));
                return { status: 'success' };
            }
        }
